<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Window Object Demo</title>

<style>
body{
    font-family: Arial;
    padding:20px;
}

button{
    padding:10px;
    margin:5px;
}

#output{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
}
</style>

</head>
<body>

<h1>Window Object Demonstration</h1>

<button id="alertBtn">
    Show Alert
</button>

<button id="promptBtn">
    Show Prompt
</button>

<button id="confirmBtn">
    Show Confirm
</button>

<br><br>

<input
    type="text"
    id="myInput"
    placeholder="Type Something">

<div id="output"></div>

<script>

let output =document.getElementById("output");


/*
alert()
Displays a popup message.
Execution pauses until the user clicks OK.
*/
document.getElementById("alertBtn").addEventListener("click",function(){
    alert("Hello from Alert!");
});


/*
prompt()
Asks the user for input.
Returns:String or null
*/
document.getElementById("promptBtn").addEventListener("click",function(){
    let name = prompt("Enter Your Name");
    output.innerText ="Hello " + name;
});


/*
confirm()
Asks user to confirm.
Returns:
true
or
false
*/
document.getElementById("confirmBtn").addEventListener("click",function(){
let result = confirm("Are you sure?");
output.innerText ="Result : " + result;
});


/*
click Event
*/
document.getElementById("alertBtn").addEventListener("click",function(){
console.log("Button Clicked");});

/*
keydown Event
*/
document.getElementById("myInput").addEventListener("keydown",function(){
console.log("Key Pressed");
});


/*
input Event
*/
document.getElementById("myInput").addEventListener("input",function(){
    console.log("Typing");
});


/*
change Event
Triggers when value changes
and user leaves the field.
*/
document.getElementById("myInput").addEventListener("change",function(){
    console.log("Value Changed");
});


/*
mouseover Event
Triggers when mouse enters.
*/
document.getElementById("myInput").addEventListener("mouseover",function(){
    console.log("Mouse Entered");
});
</script>
</body>
</html>
