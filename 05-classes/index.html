<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassList Methods</title>
</head>

<body>
    <h1 id="sky">the sky is blue</h1>
    <h1 id="sa" class="pink">the sky is pink</h1>
    <button id="btn">Dark Mode</button>
</body>

<script>
    // getElementById()
    // Selects ONE element using its id
    let x = document.getElementById("sky");

    // classList.add()
    // Adds a class to the selected element
    // Here class "s" is added to h1 with id="sky"
    x.classList.add("s");


    // Selecting second heading
    let y = document.getElementById("sa");



    // classList.remove()
    // Removes a class from element
    // Removes class="pink" from second h1
    y.classList.remove("pink");


    // onclick event
    // Runs function when button is clicked
    document.getElementById("btn").onclick = function(){



    // classList.toggle()
    // If class exists → removes it
    // If class does not exist → adds it
    // Here dark mode is toggled on body
    document.body.classList.toggle("dark")


   // classList.contains()
   // Checks if class exists or not
   // Returns true or false
   if(document.body.classList.contains("dark")){
   console.log("Dark mode ON")
   }

}

</script>
<style>

    /*
       Class ".s"
       This style gets applied when
       classList.add("s") is used
    */

    .s
    {
        color:powderblue;
        border:1px solid black;
        background-color: blue;
    }



    /* 
       Class ".pink"
       Initially applied on second h1
       Removed using:
       classList.remove("pink")
    */

    .pink
    {
         color:pink;
        border:1px solid black;
        background-color: rgb(223, 6, 223);
    }



    /*
       Class ".dark"
       Used for dark mode
       Added/removed using:
       classList.toggle("dark")
    */

    .dark{

    background:black;
    color:white;

    }

</style>

</html>
