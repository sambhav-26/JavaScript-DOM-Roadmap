<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>input-values</title>
</head>

<body>

    <h1>Addition</h1>

    <!-- Input field with id="num1" -->
    <!-- .value is used to get whatever user types inside input -->
    <h3>
        Enter No-1
        <input type="number" id="num1" placeholder="Enter no 1">
    </h3>

    <!-- Second input field -->
    <h3>
        Enter No-2
        <input type="number" id="num2" placeholder="Enter no 2">
    </h3>

    <!-- When button is clicked add() function runs -->
    <button onclick="add()">Add</button>

    <!-- Final answer will be shown here -->
    <h1 id="ans"></h1>

</body>

<script>

    function add(){

        // getElementById() selects the element from DOM using id

        // .value gets the current value written inside input box

        // Input values always come as STRING from DOM

        let num1 = document.getElementById("num1").value;

        let num2 = document.getElementById("num2").value;

        // + joins strings if values are not converted to Number

        // Example:
        // "2" + "3" = "23"

        let ans = Number(num1) + Number(num2);

        // innerHTML changes the content inside selected element

        document.getElementById("ans").innerHTML = ans;
    }

</script>

</html>
