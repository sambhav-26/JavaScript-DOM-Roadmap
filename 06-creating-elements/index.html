<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creating Elements</title>
</head>
<body>
    
</body>
<script>
// Create a new element
const newElement = document.createElement('p');
// Set the text content of the new element
newElement.textContent = 'This is a new paragraph created using JavaScript.';
// Append the new element to the body of the document
document.body.appendChild(newElement);


// Create another element
const anotherElement = document.createElement('div');
// Set the inner HTML of the new element
anotherElement.innerHTML = '<h2>This is a heading inside a div.</h2>';
// Prepend the new element to the body of the document Means it will be added before the existing content of the body
document.body.prepend(anotherElement);


//remove the first element we created
newElement.remove();    

</script>
</html>
